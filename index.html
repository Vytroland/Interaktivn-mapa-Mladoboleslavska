<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Mladoboleslavska</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Průvodce Mladoboleslavskem</h1>

    <div class="map-container">
        <svg viewBox="0 0 1000 1100" xmlns="http://www.w3.org/2000/svg">
            <image href="Mapa.png" width="1000" height="1100" />
            
            <g class="map-point" data-id="mnichovo">
                <circle class="outer-ring" cx="560" cy="150" r="25"/>
                <text x="560" y="215" class="point-label" text-anchor="middle">Mnichovo Hradiště</text>
            </g>
            <g class="map-point" data-id="bela">
                <circle class="outer-ring" cx="300" cy="300" r="25"/>
                <text x="300" y="365" class="point-label" text-anchor="middle">Bělá p. Bezdězem</text>
            </g>
            <g class="map-point" data-id="boleslav">
                <circle class="outer-ring" cx="530" cy="480" r="25"/>
                <text x="530" y="545" class="point-label" text-anchor="middle">Mladá Boleslav</text>
            </g>
            <g class="map-point" data-id="michalovice">
                <circle class="outer-ring" cx="490" cy="510" r="25"/>
                <text x="490" y="575" class="point-label" text-anchor="middle">Michalovice</text>
            </g>
            <g class="map-point" data-id="loucen">
                <circle class="outer-ring" cx="740" cy="670" r="25"/>
                <text x="740" y="735" class="point-label" text-anchor="middle">Zámek Loučeň</text>
            </g>
            <g class="map-point" data-id="benatky">
                <circle class="outer-ring" cx="440" cy="790" r="25"/>
                <text x="440" y="855" class="point-label" text-anchor="middle">Benátky n. Jizerou</text>
            </g>
        </svg>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h2 id="m-title"></h2>
            <img id="m-img" src="">
            <button class="close-btn" id="closeModal">ZAVŘÍT</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
