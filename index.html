<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Průvodce Mladoboleslavskem</title>
    <link rel="stylesheet" href="style.css?v=1.6">
</head>
<body>

    <header class="top-header">
        <div class="panel"><h1>Průvodce Mladoboleslavskem</h1></div>
        <div class="panel"><p>Klikněte na body na mapě!</p></div>
    </header>

    <div class="main-content">
        <div></div> 

        <div class="white-box map-container">
            <svg id="mapa-boleslav" viewBox="0 0 1000 1100" xmlns="http://www.w3.org/2000/svg">
                <image href="Mapa.png" x="0" y="0" width="1000" height="1100" />
                
                <g class="map-point" data-id="mnichovo">
                    <circle class="outer-ring" cx="560" cy="150" r="25"/>
                    <circle cx="560" cy="150" r="8" fill="white"/>
                    <text x="560" y="210" class="point-label">Mnichovo Hradiště</text>
                </g>

                <g class="map-point" data-id="boleslav">
                    <circle class="outer-ring" cx="530" cy="480" r="25"/>
                    <circle cx="530" cy="480" r="8" fill="white"/>
                    <text x="530" y="540" class="point-label">Mladá Boleslav</text>
                </g>
                
                </svg>
        </div>

        <div id="info-panel" class="white-box info-overlay">
            <h2 id="p-title">Název</h2>
            <img id="p-img" src="" style="width:100%; border-radius:15px; margin:10px 0;">
            <p id="p-desc"></p>
            <button class="close-btn" onclick="hidePanels()">Zavřít</button>
        </div>

        <div id="double-panel" class="white-box info-overlay double-layout">
            <div>
                <h3>Mladoboleslavský Templ</h3>
                <img src="Templp.jpg" style="width:100%; border-radius:10px;">
                <p>Městský palác s multimediální expozicí.</p>
            </div>
            <div style="margin-top: 15px;">
                <h3>Škoda Muzeum</h3>
                <img src="muzeum.jpg" style="width:100%; border-radius:10px;">
                <p>Historie automobilky Škoda Auto.</p>
            </div>
            <button class="close-btn" onclick="hidePanels()">Zavřít oba</button>
        </div>
    </div>

    <script src="script.js?v=1.6"></script>
</body>
</html>
