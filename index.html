<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Průvodce Mladoboleslavskem</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="top-header">
        <div class="panel"><h1>Průvodce Mladoboleslavskem</h1></div>
        <div class="panel"><p>Klikněte na body na mapě a objevte historii regionu!</p></div>
    </header>

    <div class="main-content">
        <div class="white-box map-container">
            <svg id="mapa-boleslav" viewBox="0 0 1000 1100" xmlns="http://www.w3.org/2000/svg">
                <image href="Mapa.png" x="0" y="0" width="1000" height="1100" />
                
                <g class="map-point" data-id="mnichovo">
                    <circle class="outer-ring" cx="560" cy="150" r="25" fill="#27ae60"/>
                    <circle class="inner-dot" cx="560" cy="150" r="8" fill="white"/>
                    <text x="560" y="200" class="point-label">Mnichovo Hradiště</text>
                </g>

                <g class="map-point" data-id="bela">
                    <circle class="outer-ring" cx="300" cy="300" r="25" fill="#27ae60"/>
                    <circle class="inner-dot" cx="300" cy="300" r="8" fill="white"/>
                    <text x="300" y="350" class="point-label">Bělá p. Bezdězem</text>
                </g>

                <g class="map-point" data-id="boleslav">
                    <circle class="outer-ring" cx="530" cy="480" r="25" fill="#e74c3c"/>
                    <circle class="inner-dot" cx="530" cy="480" r="8" fill="white"/>
                    <text x="530" y="530" class="point-label">Mladá Boleslav</text>
                </g>

                <g class="map-point" data-id="michalovice">
                    <circle class="outer-ring" cx="490" cy="510" r="25" fill="#27ae60"/>
                    <circle class="inner-dot" cx="490" cy="510" r="8" fill="white"/>
                    <text x="490" y="560" class="point-label">Michalovice</text>
                </g>

                <g class="map-point" data-id="loucen">
                    <circle class="outer-ring" cx="740" cy="670" r="25" fill="#27ae60"/>
                    <circle class="inner-dot" cx="740" cy="670" r="8" fill="white"/>
                    <text x="740" y="720" class="point-label">Zámek Loučeň</text>
                </g>

                <g class="map-point" data-id="benatky">
                    <circle class="outer-ring" cx="440" cy="790" r="25" fill="#27ae60"/>
                    <circle class="inner-dot" cx="440" cy="790" r="8" fill="white"/>
                    <text x="440" y="840" class="point-label">Benátky n. Jizerou</text>
                </g>
            </svg>
        </div>

        <div id="info-wrapper">
            <div id="info-panel" class="white-box">
                <div class="panel-header">
                    <h2 id="p-title">Vyberte místo</h2>
                    <span id="p-badge" class="category-badge">Kategorie</span>
                </div>
                <img id="p-img" src="" alt="" style="display:none; width:100%; border-radius:15px; margin:15px 0;">
                <p id="p-desc">Zde se zobrazí informace.</p>
                <button class="close-btn" onclick="hidePanels()">Zavřít</button>
            </div>

            <div id="double-panel" style="display:none;">
                <div class="white-box split-card">
                    <h3>Mladoboleslavský Templ</h3>
                    <p>Městský palác s interaktivní multimediální expozicí o historii.</p>
                </div>
                <div class="white-box split-card">
                    <h3>Škoda Muzeum</h3>
                    <p>Historie světově proslulé automobilky v moderních prostorách.</p>
                </div>
                <button class="close-btn" onclick="hidePanels()" style="grid-column: span 2;">Zavřít oba</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
