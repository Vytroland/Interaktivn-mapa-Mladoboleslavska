<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Mapa Boleslavska</title>
    <link rel="stylesheet" href="style.css?v=8">
</head>
<body>
    <header class="top-header">
        <div class="panel"><h1>Mladoboleslavsko</h1></div>
    </header>

    <div class="main-content">
        <div class="side-spacer"></div>
        <div class="white-box map-container">
            <svg viewBox="0 0 1000 1100" xmlns="http://www.w3.org/2000/svg">
                <image href="Mapa.png" x="0" y="0" width="1000" height="1100" />
                <g class="map-point" data-id="mnichovo"><circle class="outer-ring" cx="560" cy="150" r="25"/><text x="560" y="210" class="point-label">Mnichovo Hradiště</text></g>
                <g class="map-point" data-id="bela"><circle class="outer-ring" cx="300" cy="300" r="25"/><text x="300" y="360" class="point-label">Bělá p. Bezdězem</text></g>
                <g class="map-point" data-id="boleslav"><circle class="outer-ring" cx="530" cy="480" r="25"/><text x="530" y="540" class="point-label">Mladá Boleslav</text></g>
                <g class="map-point" data-id="michalovice"><circle class="outer-ring" cx="490" cy="510" r="25"/><text x="490" y="570" class="point-label">Michalovice</text></g>
                <g class="map-point" data-id="loucen"><circle class="outer-ring" cx="740" cy="670" r="25"/><text x="740" y="730" class="point-label">Zámek Loučeň</text></g>
                <g class="map-point" data-id="benatky"><circle class="outer-ring" cx="440" cy="790" r="25"/><text x="440" y="850" class="point-label">Benátky n. Jizerou</text></g>
            </svg>
        </div>
        <div class="info-column">
            <div id="info-panel" class="white-box info-overlay">
                <h2 id="p-title">Název</h2>
                <img id="p-img" src="" style="width:100%; border-radius:10px;">
                <p id="p-desc"></p>
                <button onclick="window.hidePanels()">Zavřít</button>
            </div>
            <div id="double-panel" class="white-box info-overlay">
                <h3>Mladá Boleslav</h3>
                <img src="Templp.jpg" style="width:100%; border-radius:10px;">
                <p>Templ a Škoda Muzeum</p>
                <button onclick="window.hidePanels()">Zavřít</button>
            </div>
        </div>
    </div>
    <script src="script.js?v=8"></script>
</body>
</html>
