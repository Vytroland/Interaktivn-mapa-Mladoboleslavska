<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Průvodce Mladoboleslavskem</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="top-header">
        <div class="panel"><h1>Průvodce Mladoboleslavskem</h1></div>
        <div class="panel"><p>Klikněte na body na mapě a objevte historii!</p></div>
    </header>

    <div class="main-content">
        <div class="white-box map-container">
            <svg id="mapa-boleslav" viewBox="0 0 1000 1100" xmlns="http://www.w3.org/2000/svg">
                <image href="Mapa.png" x="0" y="0" width="1000" height="1100" />
                
                <g class="map-point" data-id="mnichovo">
                    <circle class="outer-ring" cx="560" cy="150" r="25"/>
                    <circle class="inner-dot" cx="560" cy="150" r="8" fill="white"/>
                    <text x="560" y="205" class="point-label">Mnichovo Hradiště</text>
                </g>

                <g class="map-point" data-id="bela">
                    <circle class="outer-ring" cx="300" cy="300" r="25"/>
                    <circle class="inner-dot" cx="300" cy="300" r="8" fill="white"/>
                    <text x="300" y="355" class="point-label">Bělá p. Bezdězem</text>
                </g>

                <g class="map-point" data-id="boleslav">
                    <circle class="outer-ring" cx="530" cy="480" r="25"/>
                    <circle class="inner-dot" cx="530" cy="480" r="8" fill="white"/>
                    <text x="530" y="535" class="point-label">Mladá Boleslav</text>
                </g>

                <g class="map-point" data-id="michalovice">
                    <circle class="outer-ring" cx="490" cy="510" r="25"/>
                    <circle class="inner-dot" cx="490" cy="510" r="8" fill="white"/>
                    <text x="490" y="565" class="point-label">Michalovice</text>
                </g>

                <g class="map-point" data-id="loucen">
                    <circle class="outer-ring" cx="740" cy="670" r="25"/>
                    <circle class="inner-dot" cx="740" cy="670" r="8" fill="white"/>
                    <text x="740" y="725" class="point-label">Zámek Loučeň</text>
                </g>

                <g class="map-point" data-id="benatky">
                    <circle class="outer-ring" cx="440" cy="790" r="25"/>
                    <circle class="inner-dot" cx="440" cy="790" r="8" fill="white"/>
                    <text x="440" y="845" class="point-label">Benátky n. Jizerou</text>
                </g>
            </svg>
        </div>

        <div id="info-panel" class="white-box">
            <h2 id="p-title">Název</h2>
            <img id="p-img" src="" alt="" style="width:100%; border-radius:15px; margin:10px 0;">
            <p id="p-desc"></p>
            <button class="close-btn" onclick="hidePanels()">Zavřít</button>
        </div>

        <div id="double-panel" class="white-box" style="display:none; grid-template-columns: 1fr 1fr; gap:15px;">
            <div>
                <h3>Mladoboleslavský Templ</h3>
                <img src="Templ.jpg" style="width:100%; border-radius:10px;">
                <p>Městský palác s multimediální expozicí.</p>
            </div>
            <div>
                <h3>Škoda Muzeum</h3>
                <img src="muzeum.jpg" style="width:100%; border-radius:10px;">
                <p>Historie slavné automobilky.</p>
            </div>
            <button class="close-btn" onclick="hidePanels()" style="grid-column: span 2;">Zavřít</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
